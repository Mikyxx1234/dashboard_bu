server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # index.html and env-config.js must never be cached
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API sessions para o backend banco-compose
    location /api/sessions/ {
        proxy_pass https://banco-compose.6tqx2r.easypanel.host/api/sessions/;
        proxy_set_header Host banco-compose.6tqx2r.easypanel.host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite hashed assets (filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static files
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
