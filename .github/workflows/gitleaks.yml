name: Secret scan (gitleaks)

# R17 — Scans the repository for accidentally committed secrets
# (API keys, tokens, passwords). Runs on every push/PR and weekly.
# Configure custom rules in `.gitleaks.toml` if needed.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Detect secrets in repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set to 'true' to fail the build on findings.
          # Keep enabled to enforce R17.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
